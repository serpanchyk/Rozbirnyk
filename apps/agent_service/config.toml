[service]
name = "agent_service"
version = "0.1.0"
port = 8001

[logging]
level = "INFO"

[model]
provider = "bedrock"
model_id = "us.anthropic.claude-sonnet-4-20250514-v1:0"
region_name = "us-east-1"
temperature = 0.2
max_tokens = 4096

[mcp_servers.wiki_service]
host = "wiki_service"
port = 8000
transport = "streamable_http"
endpoint = "mcp/"

[mcp_servers.news_service]
host = "news_service"
port = 8000
transport = "sse"

[world_builder]
max_steps = 8
max_actors = 8
max_state_files = 12
