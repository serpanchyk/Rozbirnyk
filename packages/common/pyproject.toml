[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "rozbirnyk_common"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "python-json-logger>=4.1.0",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.2.0",
    "toml>=0.10.2",
    "redis>=7.4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/common"]

[tool.uv.sources]
rozbirnyk-common = { path = ".", editable = true }
