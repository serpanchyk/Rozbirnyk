name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check uv lock
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pre-commit
        run: uv run pre-commit run --all-files

      - name: Pytest
        run: uv run pytest