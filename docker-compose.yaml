version: '3.8'

services:
  # ----------------------------------------
  # 1. The Core Application
  # ----------------------------------------
  agent-service:
    container_name: rozbirnyk-agent
    build:
      context: .
      dockerfile: apps/agent_service/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
      - apps/agent_service/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      news-service:
        condition: service_healthy
      wiki-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 8001)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    container_name: rozbirnyk-backend
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
      - apps/backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      agent-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 8000)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    container_name: rozbirnyk-frontend
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_BACKEND_URL: http://localhost:8000
    ports:
      - "8501:8501"
    env_file:
      - .env
      - apps/frontend/.env
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e 'fetch(\"http://localhost:8501\").then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------
  # 2. The MCP Microservices
  # ----------------------------------------
  news-service:
    container_name: rozbirnyk-news
    build:
      context: .
      dockerfile: mcp_servers/news_service/Dockerfile
    ports:
      - "8002:8000"
    env_file:
      - .env
      - mcp_servers/news_service/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 8000)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  wiki-service:
    container_name: rozbirnyk-wiki
    build:
      context: .
      dockerfile: mcp_servers/wiki_service/Dockerfile
    ports:
      - "8003:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - wiki-data:/data/wiki
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 8000)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------
  # 3. 3rd-party services
  # ----------------------------------------
  redis:
    container_name: rozbirnyk-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  wiki-data:
