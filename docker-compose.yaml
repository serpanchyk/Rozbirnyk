services:
  # ----------------------------------------
  # 1. The Core Application
  # ----------------------------------------
  agent-service:
    build:
      context: .
      dockerfile: apps/agent_service/Dockerfile
    ports:
      - "${AGENT_SERVICE_PORT:-8001}:8001"
    environment:
      - PYTHONUNBUFFERED=1
      - AWS_PROFILE
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - AWS_SESSION_TOKEN
      - AWS_REGION
      - AWS_DEFAULT_REGION
      - MODEL__MODEL_ID=${MODEL__MODEL_ID:-}
      - MODEL__REGION_NAME=${MODEL__REGION_NAME:-}
      - MODEL__RUNTIME__MAX_CONCURRENCY=${MODEL__RUNTIME__MAX_CONCURRENCY:-1}
      - MODEL__RUNTIME__MIN_SECONDS_BETWEEN_CALLS=${MODEL__RUNTIME__MIN_SECONDS_BETWEEN_CALLS:-2.0}
      - MODEL__RUNTIME__MAX_RETRIES=${MODEL__RUNTIME__MAX_RETRIES:-10}
      - MODEL__RUNTIME__RETRY_BASE_SECONDS=${MODEL__RUNTIME__RETRY_BASE_SECONDS:-1.0}
      - MODEL__RUNTIME__RETRY_MAX_SECONDS=${MODEL__RUNTIME__RETRY_MAX_SECONDS:-60.0}
      - OBSERVABILITY__LANGSMITH__ENABLED=${OBSERVABILITY__LANGSMITH__ENABLED:-false}
      - OBSERVABILITY__LANGSMITH__PROJECT=${OBSERVABILITY__LANGSMITH__PROJECT:-rozbirnyk}
      - OBSERVABILITY__LANGSMITH__API_KEY=${OBSERVABILITY__LANGSMITH__API_KEY:-}
      - OBSERVABILITY__LANGSMITH__ENDPOINT=${OBSERVABILITY__LANGSMITH__ENDPOINT:-}
    volumes:
      - ${AWS_SHARED_CREDENTIALS_DIR:-${HOME}/.aws}:/root/.aws:ro
    depends_on:
      news-service:
        condition: service_healthy
      wiki-service:
        condition: service_healthy
    networks:
      default:
        aliases:
          - agent_service
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 8001)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      agent-service:
        condition: service_healthy
    networks:
      default:
        aliases:
          - backend
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 8000)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-8501}:8501"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e 'fetch(\"http://localhost:8501\").then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------
  # 2. The MCP Microservices
  # ----------------------------------------
  news-service:
    build:
      context: .
      dockerfile: mcp_servers/news_service/Dockerfile
    ports:
      - "${NEWS_SERVICE_PORT:-8002}:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - TAVILY_API_KEY=${TAVILY_API_KEY:?Set TAVILY_API_KEY in the repo-root .env file}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      default:
        aliases:
          - news_service
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 8000)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  wiki-service:
    build:
      context: .
      dockerfile: mcp_servers/wiki_service/Dockerfile
    ports:
      - "${WIKI_SERVICE_PORT:-8003}:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - wiki-data:/data/wiki
    networks:
      default:
        aliases:
          - wiki_service
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 8000)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------
  # 3. 3rd-party services
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  wiki-data:
