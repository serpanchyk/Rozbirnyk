version: '3.8'

services:
  # ----------------------------------------
  # 1. The Core Application
  # ----------------------------------------
  agent-service:
    container_name: rozbirnyk-agent
    build:
      context: .
      dockerfile: apps/agent_service/Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
      - apps/agent_service/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      news-service:
        condition: service_healthy
      fluentd:
        condition: service_healthy
    logging:
      driver: "fluentd"
      options:
        fluentd-address: localhost:24224
        tag: agent-service
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 8000)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    container_name: rozbirnyk-backend
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
      - apps/backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      agent-service:
        condition: service_healthy
      fluentd:
        condition: service_healthy
    logging:
      driver: "fluentd"
      options:
        fluentd-address: localhost:24224
        tag: backend
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 8000)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    container_name: rozbirnyk-frontend
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - .env
      - apps/frontend/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      backend:
        condition: service_healthy
      fluentd:
        condition: service_healthy
    logging:
      driver: "fluentd"
      options:
        fluentd-address: localhost:24224
        tag: frontend
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 8501)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------
  # 2. The MCP Microservices
  # ----------------------------------------
  news-service:
    container_name: rozbirnyk-news
    build:
      context: .
      dockerfile: mcp_servers/news_service/Dockerfile
    ports:
      - "8002:8000"
    env_file:
      - .env
      - mcp_servers/news_service/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      redis:
        condition: service_healthy
      fluentd:
        condition: service_healthy
    logging:
      driver: "fluentd"
      options:
        fluentd-address: localhost:24224
        tag: news-service
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 8000)); s.close()'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------
  # 3. 3rd-party services
  # ----------------------------------------
  elasticsearch:
    container_name: rozbirnyk-elasticsearch
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  fluentd:
    container_name: rozbirnyk-fluentd
    image: fluent/fluentd:v1.16-debian-1
    volumes:
      - ./infra/logging/fluentd/fluent.conf:/fluentd/etc/fluent.conf
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ruby -e 'require \"socket\"; begin; TCPSocket.new(\"127.0.0.1\", 24224); rescue; exit 1; end'"]
      interval: 10s
      timeout: 5s
      retries: 5

  kibana:
    container_name: rozbirnyk-kibana
    image: kibana:8.13.0
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    container_name: rozbirnyk-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5