version: '3.8'

services:
  # ----------------------------------------
  # 1. The Core Application
  # ----------------------------------------
  agent-service:
    container_name: rozbirnyk-agent
    build:
      context: .
      dockerfile: apps/agent_service/Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
      - apps/agent_service/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - knowledge-service
      - news-service
      - opinion-service
      - probability-service
      - fluentd
      - redis
    logging:
      driver: "fluentd"
      options:
        fluentd-address: localhost:24224
        tag: agent-service
    restart: unless-stopped

  backend:
    container_name: rozbirnyk-backend
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
      - apps/backend/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - agent-service
      - fluentd
    logging:
      driver: "fluentd"
      options:
        fluentd-address: localhost:24224
        tag: backend
    restart: unless-stopped

  frontend:
    container_name: rozbirnyk-frontend
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "8501:8501" # Default Streamlit port, change if using something else
    env_file:
      - .env
      - apps/frontend/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - backend
      - fluentd
    logging:
      driver: "fluentd"
      options:
        fluentd-address: localhost:24224
        tag: frontend
    restart: unless-stopped

  # ----------------------------------------
  # 2. The MCP Microservices
  # ----------------------------------------
  knowledge-service:
    container_name: rozbirnyk-knowledge
    build:
      context: .
      dockerfile: mcp_servers/knowledge_service/Dockerfile
    ports:
      - "8002:8000"
    env_file:
      - .env
      - mcp_servers/knowledge_service/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - fluentd
      - redis
    logging:
      driver: "fluentd"
      options:
        fluentd-address: localhost:24224
        tag: knowledge-service
    restart: unless-stopped

  news-service:
    container_name: rozbirnyk-news
    build:
      context: .
      dockerfile: mcp_servers/news_service/Dockerfile
    ports:
      - "8003:8000"
    env_file:
      - .env
      - mcp_servers/news_service/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - fluentd
      - redis
    logging:
      driver: "fluentd"
      options:
        fluentd-address: localhost:24224
        tag: news-service
    restart: unless-stopped

  opinion-service:
    container_name: rozbirnyk-opinion
    build:
      context: .
      dockerfile: mcp_servers/opinion_service/Dockerfile
    ports:
      - "8004:8000"
    env_file:
      - .env
      - mcp_servers/opinion_service/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - fluentd
      - redis
    logging:
      driver: "fluentd"
      options:
        fluentd-address: localhost:24224
        tag: opinion-service
    restart: unless-stopped

  probability-service:
    container_name: rozbirnyk-probability
    build:
      context: .
      dockerfile: mcp_servers/probability_service/Dockerfile
    ports:
      - "8005:8000"
    env_file:
      - .env
      - mcp_servers/probability_service/.env
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - fluentd
      - redis
    logging:
      driver: "fluentd"
      options:
        fluentd-address: localhost:24224
        tag: probability-service
    restart: unless-stopped

  # ----------------------------------------
  # 3. 3rd-party services
  # ----------------------------------------
  elasticsearch:
    container_name: rozbirnyk-elasticsearch
    image: elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"

  fluentd:
    container_name: rozbirnyk-fluentd
    image: fluent/fluentd:v1.16-debian-1
    volumes:
      - ./infra/logging/fluentd/fluent.conf:/fluentd/etc/fluent.conf
    ports:
      - "24224:24224"
      - "24224:24224/udp"
    depends_on:
      - elasticsearch

  kibana:
    container_name: rozbirnyk-kibana
    image: kibana:8.13.0
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  redis:
    container_name: rozbirnyk-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped